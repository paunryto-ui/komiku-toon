<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PlantLens</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#111810;min-height:100dvh;display:flex;justify-content:center;align-items:flex-start}
  #root{width:100%;max-width:430px;min-height:100dvh;background:#f7f6ea;position:relative;overflow:hidden}
  .ms{font-family:'Material Symbols Outlined';font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;word-wrap:normal;user-select:none;-webkit-font-feature-settings:'liga';font-feature-settings:'liga';font-size:inherit}
  *{scrollbar-width:none;-ms-overflow-style:none}
  *::-webkit-scrollbar{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.15);opacity:0.9}}
  @keyframes sweep{0%{transform:translateY(0);opacity:0.9}80%{opacity:0.6}100%{transform:translateY(310px);opacity:0}}
  @keyframes dotpulse{0%,80%,100%{transform:scale(0);opacity:0}40%{transform:scale(1);opacity:1}}
  @keyframes fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  .shimmer{background:linear-gradient(90deg,#e9e8dd 25%,#f0efe4 50%,#e9e8dd 75%);background-size:400px 100%;animation:shimmer 1.4s infinite}
  .scan-line{animation:sweep 2.4s ease-in infinite}
  .corner{position:absolute;width:28px;height:28px}
  .corner-tl{top:-2px;left:-2px;border-top:3px solid #c1ecd4;border-left:3px solid #c1ecd4;border-radius:8px 0 0 0}
  .corner-tr{top:-2px;right:-2px;border-top:3px solid #c1ecd4;border-right:3px solid #c1ecd4;border-radius:0 8px 0 0}
  .corner-bl{bottom:-2px;left:-2px;border-bottom:3px solid #c1ecd4;border-left:3px solid #c1ecd4;border-radius:0 0 0 8px}
  .corner-br{bottom:-2px;right:-2px;border-bottom:3px solid #c1ecd4;border-right:3px solid #c1ecd4;border-radius:0 0 8px 0}
  .dot1{animation:dotpulse 1.4s ease-in-out 0s infinite}
  .dot2{animation:dotpulse 1.4s ease-in-out 0.2s infinite}
  .dot3{animation:dotpulse 1.4s ease-in-out 0.4s infinite}
  .fadeup{animation:fadeup 0.5s ease both}
  video{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── CONFIG ─── */
const OR_KEY = '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';
const MODEL  = 'google/gemini-2.0-flash-exp:free';

/* ─── TAILWIND ─── */
tailwind.config = {
  theme:{extend:{colors:{
    'g-dark':'#012d1d','g-mid':'#1b4332','g-light':'#43664d',
    'g-pale':'#c2e9c9','g-cream':'#f7f6ea','g-sand':'#efeee3',
    'g-linen':'#f5f4e8','g-mist':'#e9e8dd',
    'ink':'#1b1c15','ink-2':'#414844','ink-3':'#717973',
  }}}
};

/* ─── ICON ─── */
const I = ({n,cls=''}) => <span className={`ms ${cls}`}>{n}</span>;

/* ─── COMPRESS IMAGE ─── */
async function compressImg(b64,maxW=800){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const r=Math.min(maxW/img.width,maxW/img.height,1);
      c.width=img.width*r; c.height=img.height*r;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.78).split(',')[1]);
    };
    img.src=`data:image/jpeg;base64,${b64}`;
  });
}

/* ─── AI CALL ─── */
async function scanPlant(b64){
  const img = await compressImg(b64);
  const prompt=`You are PlantLens, an expert botanist AI. Analyze the image carefully.

If a plant is visible, return ONLY valid JSON (no markdown, no commentary):
{
  "found":true,
  "name":"Common Name",
  "scientific_name":"Scientific name",
  "confidence":92,
  "emoji":"🌿",
  "tagline":"One punchy sentence about this plant",
  "description":"2-3 sentence engaging description",
  "category":"Decorative",
  "toxicity":"Safe",
  "benefits":["benefit 1","benefit 2","benefit 3","benefit 4"],
  "habitat":{
    "native":"Region/country of origin",
    "climate":"Tropical / Subtropical / Temperate",
    "grows_in":"Where it naturally grows",
    "countries":["Country1","Country2","Country3"]
  },
  "can_be_potted":true,
  "potting":{
    "soil":"Best soil type",
    "sunlight":"Light requirements",
    "water":"Watering schedule",
    "pot":"Pot recommendation",
    "tips":["Tip 1","Tip 2","Tip 3"]
  },
  "care":{
    "difficulty":"Easy",
    "temp":"15–30°C",
    "humidity":"High",
    "growth":"Fast"
  },
  "facts":["Fun fact 1","Fun fact 2","Fun fact 3"]
}

Category must be one of: Decorative, Medicinal, Edible, Rare
Toxicity must be one of: Safe, Mildly Toxic, Toxic

If NO plant is visible: {"found":false,"message":"No plant detected"}`;

  const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
    method:'POST',
    headers:{
      'Authorization':`Bearer ${OR_KEY}`,
      'Content-Type':'application/json',
      'HTTP-Referer':window.location.href,
      'X-Title':'PlantLens'
    },
    body:JSON.stringify({
      model:MODEL,
      messages:[{role:'user',content:[
        {type:'image_url',image_url:{url:`data:image/jpeg;base64,${img}`}},
        {type:'text',text:prompt}
      ]}],
      max_tokens:1600,temperature:0.1
    })
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  const txt=d.choices[0]?.message?.content||'';
  const m=txt.match(/\{[\s\S]*\}/);
  if(!m)throw new Error('Bad response format');
  return JSON.parse(m[0]);
}

/* ══════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════ */
function BottomNav({active,go}){
  const tabs=[
    {id:'home',ic:'home',lb:'Home'},
    {id:'scan',ic:'filter_center_focus',lb:'Scan'},
    {id:'collection',ic:'grid_view',lb:'Collection'},

  return(
    <nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,zIndex:60,padding:'0 16px 20px'}}>
      <div style={{background:'rgba(247,246,234,0.92)',backdropFilter:'blur(20px)',borderRadius:24,display:'flex',justifyContent:'space-around',padding:'6px 8px',boxShadow:'0 -2px 32px rgba(27,28,21,0.10)'}}>
        {tabs.map(t=>{
          const on=active===t.id;
          return(
            <button key={t.id} onClick={()=>go(t.id)}
              style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'8px 20px',borderRadius:18,border:'none',cursor:'pointer',background:on?'#1b4332':'transparent',transition:'all 0.2s',transform:'scale(1)',color:on?'#f7f6ea':'#1b1c15'}}>
              <I n={t.ic} cls={`text-2xl`} />

  );
}

function HomeScreen({collection,go}){

  return(
    <div style={{minHeight:'100dvh',background:'#f7f6ea',paddingBottom:120}}>
      {/* Header */}

        <p style={{fontFamily:'Be Vietnam Pro',fontSize:13,color:'#717973',marginBottom:4}}>Good day 🌿</p>
        <h1 style={{fontFamily:'Manrope',fontWeight:800,fontSize:32,color:'#012d1d',margin:0,letterSpacing:'-0.04em',lineHeight:1.1}}>PlantLens</h1>

          onMouseDown={e=>e.currentTarget.style.transform='scale(0.97)'}
          onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
          onTouchStart={e=>e.currentTarget.style.transform='scale(0.97)'}
          onTouchEnd={e=>e.currentTarget.style.transform='scale(1)'}>
          <div style={{textAlign:'left'}}>
            <p style={{fontFamily:'Be Vietnam Pro',fontSize:12,color:'#86af99',margin:'0 0 4px',textTransform:'uppercase',letterSpacing:'0.1em'}}>Ready to identify</p>
            <h2 style={{fontFamily:'Manrope',fontWeight:800,fontSize:22,color:'#fff',margin:0,letterSpacing:'-0.02em'}}>Scan a Plant</h2>
            <p style={{fontFamily:'Be Vietnam Pro',fontSize:12,color:'#a5d0b9',margin:'4px 0 0'}}>Point camera at any plant</p>
          </div>
          <div style={{width:60,height:60,background:'rgba(193,236,212,0.15)',borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <I n="filter_center_focus" cls="text-[#c1ecd4]" style={{fontSize:32}} />
          </div>
        </button>
      </div>

      {/* Stats row */}
      <div className="h-card" style={{display:'flex',gap:12,margin:'0 20px 20px',opacity:0}}>
        <div style={{flex:1,background:'#c2e9c9',borderRadius:20,padding:'16px 14px'}}>
          <p style={{fontFamily:'Manrope',fontWeight:800,fontSize:28,color:'#012d1d',margin:0}}>{collection.length}</p>
          <p style={{fontFamily:'Be Vietnam Pro',fontSize:11,color:'#43664d',margin:'2px 0 0'}}>Plants saved</p>
        </div>
        <div style={{flex:1,background:'#efeee3',borderRadius:20,padding:'16px 14px'}}>
          <p style={{fontFamily:'Manrope',fontWeight:800,fontSize:28,color:'#012d1d',margin:0}}>∞</p>
          <p style={{fontFamily:'Be Vietnam Pro',fontSize:11,color:'#43664d',margin:'2px 0 0'}}>Species to find</p>
        </div>
        <div style={{flex:1,background:'#f5f4e8',borderRadius:20,padding:'16px 14px',border:'1.5px solid #e9e8dd'}}>
          <p style={{fontFamily:'Manrope',fontWeight:800,fontSize:24,color:'#012d1d',margin:0}}>AI</p>
          <p style={{fontFamily:'Be Vietnam Pro',fontSize:11,color:'#43664d',margin:'2px 0 0'}}>Powered</p>

      {/* Recent scans */}

/* ══════════════════════════════════════
   SCAN SCREEN
══════════════════════════════════════ */
function ScanScreen({onResult,go}){
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const [ready,setReady]=useState(false);
  const [camErr,setCamErr]=useState(null);
  const [loading,setLoading]=useState(false);
  const [status,setStatus]=useState('Arahkan ke tanaman');
  const [flash,setFlash]=useState(false);
  const [facing,setFacing]=useState('environment');
  const [camBusy,setCamBusy]=useState(false);

  useEffect(()=>{
    startCam('environment');
    return ()=>stopCam();
  },[]);

  useEffect(()=>{
    if(ready&&!loading){
      anime({targets:'.corner',opacity:[0.4,1],duration:900,loop:true,direction:'alternate',easing:'easeInOutSine',delay:anime.stagger(120)});
      anime({targets:'.breathe-ring',scale:[1,1.25],opacity:[0.35,0],duration:1800,loop:true,easing:'easeOutSine'});
    }
  },[ready,loading]);

  const stopCam=()=>{
    if(streamRef.current){
      streamRef.current.getTracks().forEach(t=>t.stop());
      streamRef.current=null;
    }
    if(videoRef.current) videoRef.current.srcObject=null;
  };

  const startCam=async(facingMode)=>{
    stopCam();
    setReady(false);
    setCamErr(null);
    setCamBusy(true);
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      setCamErr('Browser ini tidak support kamera. Gunakan Chrome/Firefox terbaru.');
      setCamBusy(false);
      return;
    }
    // Try multiple constraint combos
    const tries=[
      {video:{facingMode:{exact:facingMode}}},
      {video:{facingMode:facingMode,width:{ideal:1280},height:{ideal:720}}},
      {video:{facingMode:facingMode}},
      {video:true},
    ];
    let stream=null;
    for(const c of tries){
      try{ stream=await navigator.mediaDevices.getUserMedia(c); break; }
      catch(err){ continue; }
    }
    if(!stream){
      setCamErr('Izin kamera ditolak. Izinkan akses kamera di browser, lalu tekan Refresh.');
      setCamBusy(false);
      return;
    }
    streamRef.current=stream;
    const v=videoRef.current;
    if(!v){ stream.getTracks().forEach(t=>t.stop()); setCamBusy(false); return; }
    v.srcObject=stream;
    v.setAttribute('playsinline','');
    v.setAttribute('webkit-playsinline','');
    v.muted=true;
    v.volume=0;
    await new Promise(res=>{ v.onloadedmetadata=res; setTimeout(res,3000); });
    try{ await v.play(); }catch(_){}
    setFacing(facingMode);
    setReady(true);
    setCamBusy(false);
  };

  const flipCam=()=>{
    if(camBusy||loading)return;
    const next=facing==='environment'?'user':'environment';
    startCam(next);
  };

  const refreshCam=()=>{
    if(loading)return;
    startCam(facing);
  };

  const capture=async()=>{
    if(loading||!ready)return;
    const v=videoRef.current,c=canvasRef.current;
    if(!v||!c)return;
    c.width=v.videoWidth||1280; c.height=v.videoHeight||720;
    c.getContext('2d').drawImage(v,0,0);
    const b64=c.toDataURL('image/jpeg',0.85).split(',')[1];
    await analyze(b64);
  };

  const analyze=async(b64)=>{
    setFlash(true); setTimeout(()=>setFlash(false),250);
    setLoading(true); setStatus('Menganalisa...');
    anime({targets:'.load-ring',rotate:[0,360],duration:900,loop:true,easing:'linear'});
    try{
      const plant=await scanPlant(b64);
      stopCam();
      if(!plant.found){
        setLoading(false); setStatus('Tanaman tidak terdeteksi');
        setTimeout(()=>setStatus('Arahkan ke tanaman'),3000);
        startCam(facing); return;
      }
      onResult(plant);
    }catch(e){
      setLoading(false); setStatus('Error: '+e.message.slice(0,40));
      setTimeout(()=>setStatus('Arahkan ke tanaman'),4000);
      startCam(facing);
    }
  };

  const handleFile=e=>{
    const f=e.target.files[0]; if(!f)return;
    const fr=new FileReader();
    fr.onload=async ev=>{
      const b64=ev.target.result.split(',')[1];
      setLoading(true); setStatus('Menganalisa foto...');
      anime({targets:'.load-ring',rotate:[0,360],duration:900,loop:true,easing:'linear'});
      try{
        const plant=await scanPlant(b64);
        if(!plant.found){setLoading(false);setStatus('Tidak ada tanaman di foto');setTimeout(()=>setStatus('Arahkan ke tanaman'),3000);return;}
        stopCam(); onResult(plant);
      }catch(e){setLoading(false);setStatus('Error: '+e.message.slice(0,40));setTimeout(()=>setStatus('Arahkan ke tanaman'),4000);}
    };
    fr.readAsDataURL(f); e.target.value='';
  };

  const BtnStyle={width:44,height:44,borderRadius:14,background:'rgba(0,0,0,0.38)',backdropFilter:'blur(14px)',border:'1.5px solid rgba(255,255,255,0.22)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0};

  return(
    <div style={{position:'relative',height:'100dvh',width:'100%',overflow:'hidden',background:'#0a0f09'}}>

      {/* ── LIVE VIDEO ── */}
      <video ref={videoRef} autoPlay playsInline muted
        style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',display:'block',zIndex:1,
          transform: facing==='user'?'scaleX(-1)':'none'}}/>

      {/* dim overlay */}
      <div style={{position:'absolute',inset:0,zIndex:2,pointerEvents:'none',
        background:'linear-gradient(to bottom,rgba(0,0,0,0.42) 0%,transparent 22%,transparent 62%,rgba(0,0,0,0.55) 100%)'}}/>

      {/* ── PERMISSION / ERROR CARD ── */}
      {camErr&&(
        <div style={{position:'absolute',inset:0,zIndex:30,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#f7f6ea',borderRadius:28,padding:'28px 22px',textAlign:'center',maxWidth:300,boxShadow:'0 16px 48px rgba(0,0,0,0.4)'}}>
            <div style={{fontSize:52,marginBottom:10}}>📷</div>
            <p style={{fontFamily:'Be Vietnam Pro',fontSize:13,color:'#1b1c15',lineHeight:1.6,margin:'0 0 18px'}}>{camErr}</p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button onClick={refreshCam}
                style={{background:'#1b4332',color:'#fff',border:'none',borderRadius:999,padding:'11px 20px',fontFamily:'Be Vietnam Pro',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                🔄 Coba Lagi
              </button>
              <label style={{display:'block',background:'#efeee3',color:'#1b1c15',borderRadius:999,padding:'11px 20px',fontFamily:'Be Vietnam Pro',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                🖼️ Upload Foto
                <input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile}/>
              </label>
            </div>
          </div>
        </div>
      )}

      {/* ── HEADER ── */}
      {!camErr&&(
        <header style={{position:'absolute',top:0,left:0,right:0,zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'50px 18px 12px'}}>
          <h1 style={{fontFamily:'Manrope',fontWeight:800,fontSize:22,color:'#fff',margin:0,letterSpacing:'-0.03em',textShadow:'0 2px 10px rgba(0,0,0,0.5)'}}>PlantLens</h1>
          <div style={{display:'flex',gap:9}}>
            {/* Refresh */}
            <button onClick={refreshCam} disabled={camBusy||loading} style={{...BtnStyle,opacity:camBusy||loading?0.4:1}}
              onTouchStart={e=>e.currentTarget.style.transform='scale(0.88)'}
              onTouchEnd={e=>e.currentTarget.style.transform='scale(1)'}>
              <span className="ms" style={{color:'#fff',fontSize:22,fontVariationSettings:"'FILL' 0,'wght' 300"}}>refresh</span>
            </button>
            {/* Flip */}
            <button onClick={flipCam} disabled={camBusy||loading} style={{...BtnStyle,opacity:camBusy||loading?0.4:1}}
              onTouchStart={e=>e.currentTarget.style.transform='scale(0.88)'}
              onTouchEnd={e=>e.currentTarget.style.transform='scale(1)'}>
              <span className="ms" style={{color:'#fff',fontSize:22,fontVariationSettings:"'FILL' 0,'wght' 300"}}>flip_camera_android</span>
            </button>

            </div>
            <p style={{fontFamily:'Manrope',fontWeight:800,fontSize:18,color:'#012d1d',margin:'0 0 4px'}}>Mengidentifikasi...</p>
            <p style={{fontFamily:'Be Vietnam Pro',fontSize:13,color:'#717973',margin:'0 0 16px'}}>AI sedang menganalisa tanaman</p>

      {/* ── FLASH ── */}
      {flash&&<div style={{position:'absolute',inset:0,zIndex:40,background:'#fff',opacity:0.65,pointerEvents:'none'}}/>}

      {/* ── SHUTTER ── */}

          <button onClick={capture} disabled={!ready||loading}
            style={{width:80,height:80,borderRadius:'50%',background:'rgba(255,255,255,0.15)',backdropFilter:'blur(14px)',border:'none',cursor:'pointer',padding:6,boxShadow:'0 8px 32px rgba(0,0,0,0.4)',transition:'transform 0.12s',opacity:ready?1:0.5}}
            onTouchStart={e=>e.currentTarget.style.transform='scale(0.9)'}
            onTouchEnd={e=>e.currentTarget.style.transform='scale(1)'}>
            <div style={{width:'100%',height:'100%',borderRadius:'50%',border:'3.5px solid rgba(255,255,255,0.92)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{width:54,height:54,borderRadius:'50%',background:'rgba(255,255,255,0.95)'}}/>

      <canvas ref={canvasRef} style={{display:'none'}}/>
      <BottomNav active="scan" go={go}/>
    </div>
  );
}

/* ══════════════════════════════════════
   COLLECTION SCREEN
══════════════════════════════════════ */
function CollectionScreen({collection,go,onSelect}){
  const [filter,setFilter]=useState('All');
  const filters=['All','Decorative','Medicinal','Edible','Rare'];

  useEffect(()=>{
    anime({targets:'.coll-card',scale:[0.88,1],opacity:[0,1],delay:anime.stagger(55),duration:380,easing:'easeOutBack'});
  },[filter]);

  const shown=filter==='All'?collection:collection.filter(p=>p.category===filter);

  return(
    <div style={{minHeight:'100dvh',background:'#f7f6ea',paddingBottom:120}}>
      <div style={{padding:'56px 20px 16px'}}>
        <h1 style={{fontFamily:'Manrope',fontWeight:800,fontSize:28,color:'#012d1d',margin:'0 0 3px',letterSpacing:'-0.03em'}}>My Collection</h1>
        <p style={{fontFamily:'Be Vietnam Pro',fontSize:13,color:'#717973',margin:0}}>{collection.length} plant{collection.length!==1?'s':''} saved</p>
      </div>
      {/* Filters */}
      <div style={{display:'flex',gap:8,padding:'0 20px 18px',overflowX:'auto'}}>
        {filters.map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{flexShrink:0,padding:'7px 16px',borderRadius:999,border:'none',cursor:'pointer',transition:'all 0.2s',
              background:filter===f?'#012d1d':'#efeee3',color:filter===f?'#fff':'#414844',
              fontFamily:'Be Vietnam Pro',fontSize:12,fontWeight:600}}>
            {f}
          </button>
        ))}
      </div>
      {/* Grid */}
      {shown.length===0?(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 20px',textAlign:'center'}}>
          <div style={{fontSize:56,marginBottom:16}}>🌱</div>
          <p style={{fontFamily:'Be Vietnam Pro',fontSize:15,color:'#717973',margin:'0 0 20px',lineHeight:1.5}}>
            {collection.length===0?'Your collection is empty.\nScan your first plant!':'No plants in this category.'}
          </p>
          {collection.length===0&&(
            <button onClick={()=>go('scan')} style={{background:'#1b4332',color:'#fff',border:'none',borderRadius:999,padding:'12px 28px',fontFamily:'Be Vietnam Pro',fontSize:14,fontWeight:600,cursor:'pointer'}}>
              Scan a Plant
            </button>
          )}
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,padding:'0 16px'}}>
          {shown.map(p=>{
            const cc=p.category==='Medicinal'?{bg:'#dbeafe',tx:'#1d4ed8'}:
              p.category==='Edible'?{bg:'#d1fae5',tx:'#065f46'}:
              p.category==='Rare'?{bg:'#ede9fe',tx:'#5b21b6'}:
              {bg:'#c2e9c9',tx:'#1b4332'};
            return(
              <button key={p.id} className="coll-card" onClick={()=>onSelect(p)}
                style={{background:'#f5f4e8',borderRadius:24,padding:'16px 14px',textAlign:'left',border:'none',cursor:'pointer',opacity:0,transition:'transform 0.15s'}}
                onMouseDown={e=>e.currentTarget.style.transform='scale(0.95)'}
                onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
                onTouchStart={e=>e.currentTarget.style.transform='scale(0.95)'}
                onTouchEnd={e=>e.currentTarget.style.transform='scale(1)'}>
                <div style={{fontSize:40,marginBottom:10}}>{p.emoji||'🌿'}</div>
                <p style={{fontFamily:'Manrope',fontWeight:700,fontSize:14,color:'#1b1c15',margin:'0 0 3px',lineHeight:1.3}}>{p.name}</p>
                <p style={{fontFamily:'Be Vietnam Pro',fontSize:11,color:'#717973',fontStyle:'italic',margin:'0 0 8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.scientific_name}</p>
                <span style={{fontSize:10,padding:'3px 10px',borderRadius:999,fontFamily:'Be Vietnam Pro',fontWeight:600,background:cc.bg,color:cc.tx}}>{p.category}</span>
              </button>
            );
          })}
        </div>
      )}
      <BottomNav active="collection" go={go}/>
    </div>
  );
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState('scan');
  const [plant,setPlant]=useState(null);
  const [collection,setCollection]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('plantlens_v1')||'[]');}catch{return [];}
  });
  const [savedSet,setSavedSet]=useState(()=>new Set(
    JSON.parse(localStorage.getItem('plantlens_v1')||'[]').map(p=>p.scientific_name)
  ));

  const persist=c=>{
    try{localStorage.setItem('plantlens_v1',JSON.stringify(c));}catch{}
  };

  const go=s=>setScreen(s);

  const onResult=p=>{setPlant(p);setScreen('result');};

  const onSave=p=>{
    if(savedSet.has(p.scientific_name))return;
    const nc=[...collection,{...p,id:Date.now()}];
    setCollection(nc);setSavedSet(prev=>new Set([...prev,p.scientific_name]));
    persist(nc);
  };

  const onSelect=p=>{setPlant(p);setScreen('result');};

  return(
    <>
      {screen==='home'&&<HomeScreen collection={collection} go={go}/>}
      {screen==='scan'&&<ScanScreen onResult={onResult} go={go}/>}
      {screen==='result'&&plant&&(
        <ResultScreen plant={plant} onSave={onSave} onBack={()=>setScreen('scan')} go={go}
          alreadySaved={savedSet.has(plant.scientific_name)}/>
      )}
      {screen==='collection'&&<CollectionScreen collection={collection} go={go} onSelect={onSelect}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
